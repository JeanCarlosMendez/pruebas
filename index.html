<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DJMENDEZ PRO</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }
      body {
          background: #0a0a0f;
          color: #e0e0ff;
          font-family: 'Share Tech Mono', monospace;
          height: 100vh;
          width: 100vw;
          overflow: hidden;
          position: relative;
      }
      /* Reproductor de fondo (blur) */
      .sync-player {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: -3;
          pointer-events: none;
      }
      .sync-player iframe {
          width: 100%;
          height: 100%;
          border: 0;
          object-fit: cover;
          filter: blur(14px) brightness(0.5);
          opacity: 0.9;
      }
      .background-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
          z-index: -2;
      }
      /* Capa de efectos fiesta */
      .fiesta-layer { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; overflow:hidden; }
      .confeti { position:absolute; width:10px; height:20px; background:linear-gradient(135deg,gold,crimson); animation:caer 3s linear forwards; }
      @keyframes caer { 0%{transform:translateY(-100vh) rotate(0deg); opacity:1;} 100%{transform:translateY(100vh) rotate(360deg); opacity:0;} }
      .numero-24, .nombre-cayendo { position:absolute; font-size:2rem; font-weight:bold; font-family:'Orbitron',monospace; color:gold; text-shadow:0 0 20px orange; white-space:nowrap; animation:caerNombre 4s linear forwards; z-index:20; }
      @keyframes caerNombre { 0%{transform:translateY(-100vh) rotate(0deg); opacity:1;} 100%{transform:translateY(100vh) rotate(10deg); opacity:0;} }
      .strobe { position:fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:9; }
      .imagen-random { position:absolute; max-width:200px; max-height:200px; border-radius:15px; box-shadow:0 0 20px gold; animation:zoom 4s ease-out forwards; pointer-events:none; z-index:15; }
      @keyframes zoom { 0%{transform:scale(0.2) rotate(0deg); opacity:0;} 20%{opacity:1;} 80%{opacity:1;} 100%{transform:scale(1.2) rotate(360deg); opacity:0;} }
      
      .mode-dj, .mode-personal { transition: opacity 0.3s; }
      .mode-dj.hide, .mode-personal.hide { display: none; }
      
      .dj-app {
          display: flex;
          flex-direction: column;
          height: 100vh;
          width: 100vw;
          padding: 15px;
          gap: 15px;
          position: relative;
          z-index: 2;
      }
      .top-row {
          display: flex;
          gap: 20px;
          flex: 1;
          min-height: 0;
      }
      /* Columna izquierda: deck */
      .deck-col {
          flex: 1;
          background: rgba(10,10,15,0.6);
          backdrop-filter: blur(16px);
          border-radius: 40px;
          padding: 20px;
          display: flex;
          flex-direction: column;
          border: 2px solid;
          border-color: #00d4ff;
          box-shadow: 0 0 25px rgba(0,212,255,0.3);
          transition: border-color 0.1s ease, box-shadow 0.2s;
          position: relative;
          overflow: hidden;
      }
      .deck-col::before {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, rgba(0,0,0,0) 70%);
          animation: rotateBg 20s linear infinite;
          pointer-events: none;
          z-index: 0;
      }
      @keyframes rotateBg {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
      }
      .deck-col > * { position: relative; z-index: 1; }
      
      .vinyl-container {
          position: relative;
          display: flex;
          justify-content: center;
          margin: 15px 0;
      }
      .vinyl {
          width: 160px;
          height: 160px;
          border-radius: 50%;
          cursor: pointer;
      }
      .vinyl canvas {
          width: 100%;
          height: 100%;
          border-radius: 50%;
          box-shadow: 0 0 20px #00d4ff;
          transition: box-shadow 0.2s;
      }
      /* Destellos alrededor del vinilo */
      .sparkle {
          position: absolute;
          width: 6px;
          height: 6px;
          background: radial-gradient(circle, #ffffff, #00d4ff);
          border-radius: 50%;
          box-shadow: 0 0 12px #00d4ff, 0 0 24px #00d4ff;
          pointer-events: none;
          animation: sparkleAnim 0.8s ease-out forwards;
          z-index: 15;
      }
      @keyframes sparkleAnim {
          0% { transform: scale(0) rotate(0deg); opacity: 1; }
          100% { transform: scale(1.8) rotate(180deg); opacity: 0; }
      }
      .vinyl-lights {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 200px;
          height: 200px;
          margin-left: -100px;
          margin-top: -100px;
          border-radius: 50%;
          pointer-events: none;
          z-index: 2;
      }
      .vinyl-lights::before,
      .vinyl-lights::after {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          box-sizing: border-box;
      }
      .vinyl-lights::before {
          border: 2px solid rgba(0,212,255,0.6);
          box-shadow: 0 0 15px #00d4ff, inset 0 0 10px #00d4ff;
          animation: rotateLight 3s linear infinite;
      }
      .vinyl-lights::after {
          border: 1px solid rgba(255,170,0,0.4);
          width: 110%;
          height: 110%;
          top: -5%;
          left: -5%;
          animation: rotateLightReverse 4s linear infinite;
      }
      @keyframes rotateLight {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
      }
      @keyframes rotateLightReverse {
          0% { transform: rotate(360deg); }
          100% { transform: rotate(0deg); }
      }
      .vinyl-ripple {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 180px;
          height: 180px;
          margin-left: -90px;
          margin-top: -90px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, rgba(0,212,255,0) 70%);
          opacity: 0;
          pointer-events: none;
      }
      .main-deck.playing .vinyl-ripple {
          animation: pulse 1s infinite;
          opacity: 0.6;
      }
      @keyframes pulse {
          0% { transform: scale(0.9); opacity: 0.5; }
          100% { transform: scale(1.2); opacity: 0; }
      }
      /* Espectro (sin vu-meter) */
      .spectrum {
          display: flex;
          justify-content: center;
          align-items: flex-end;
          gap: 4px;
          height: 45px;
          margin: 10px 0;
      }
      .spectrum-bar {
          width: 6px;
          background: #00d4ff;
          border-radius: 3px;
          transition: height 0.05s linear;
      }
      .track-info {
          text-align: center;
          margin: 10px 0 5px;
      }
      .track-title {
          font-size: 18px;
          font-weight: bold;
          text-shadow: 0 0 5px #00d4ff;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }
      .track-artist {
          font-size: 13px;
          color: #a0a0c0;
          margin-top: 4px;
      }
      .progress-bar {
          background: #1e1e30;
          border-radius: 4px;
          height: 6px;
          margin: 12px 0 8px;
          cursor: pointer;
      }
      .progress-fill {
          width: 0%;
          height: 100%;
          background: #00d4ff;
          border-radius: 4px;
          transition: width 0.2s linear;
      }
      .time-row {
          display: flex;
          justify-content: space-between;
          font-size: 11px;
          margin-bottom: 12px;
      }
      .deck-controls {
          display: flex;
          justify-content: center;
          gap: 12px;
          margin: 10px 0;
      }
      .btn {
          background: rgba(0,0,0,0.6);
          border: 1px solid #00d4ff;
          color: #e0e0ff;
          border-radius: 40px;
          padding: 6px 15px;
          cursor: pointer;
          font-size: 12px;
          transition: all 0.2s;
      }
      .btn:hover {
          background: #00d4ff;
          color: #000;
          box-shadow: 0 0 10px #00d4ff;
          transform: scale(1.02);
      }
      .btn.play {
          background: #00d4ff;
          color: #000;
          font-weight: bold;
      }
      .volume-slider {
          width: 100px;
          margin: 5px auto 0;
          display: block;
          height: 4px;
          cursor: pointer;
      }
      /* Columna derecha: video con efecto de borde */
      .video-col {
          flex: 1;
          background: rgba(0,0,0,0.5);
          border-radius: 30px;
          padding: 10px;
          display: flex;
          flex-direction: column;
          transition: box-shadow 0.2s, border-color 0.1s;
          border: 2px solid #00d4ff;
      }
      .video-col iframe {
          width: 100%;
          flex: 1;
          border-radius: 20px;
          border: none;
          pointer-events: none;
      }
      /* Fila inferior */
      .bottom-row {
          background: rgba(0,0,0,0.4);
          backdrop-filter: blur(8px);
          border-radius: 25px;
          padding: 12px;
          display: flex;
          gap: 15px;
          max-height: 280px;
      }
      .playlist-panel, .search-panel {
          background: rgba(26,26,46,0.8);
          border-radius: 20px;
          padding: 12px;
          display: flex;
          flex-direction: column;
          overflow: hidden;
      }
      .playlist-panel { flex: 2; }
      .search-panel { flex: 1; gap: 10px; }
      .panel-title {
          font-family: 'Orbitron', monospace;
          color: #ffaa00;
          text-align: center;
          margin-bottom: 10px;
          font-size: 14px;
      }
      .playlist-input-row {
          display: flex;
          gap: 8px;
          margin-bottom: 10px;
      }
      .search-input {
          width: 70%;
          flex: 1;
          background: rgba(0,0,0,0.5);
          border: 1px solid #2a2a40;
          color: #e0e0ff;
          border-radius: 40px;
          padding: 8px 15px;
          font-size: 12px;
          outline: none;
      }
      .search-input:focus { border-color: #ffaa00; }
      .search-btn {
          background: #ffaa00;
          color: #000;
          border: none;
          border-radius: 40px;
          padding: 8px 18px;
          cursor: pointer;
          font-weight: bold;
          transition: 0.2s;
      }
      .search-btn:hover {
          transform: scale(1.02);
          background: #ffcc44;
      }
      .shuffle-control {
          display: flex;
          align-items: center;
          gap: 5px;
          background: rgba(0,0,0,0.4);
          padding: 0 10px;
          border-radius: 30px;
      }
      /* Modales */
      .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.85);
          backdrop-filter: blur(8px);
          z-index: 2000;
          display: none;
          justify-content: center;
          align-items: center;
      }
      .modal-content {
          background: #1a1a2e;
          border-radius: 30px;
          padding: 20px;
          width: 90%;
          max-width: 500px;
          max-height: 80vh;
          overflow-y: auto;
          border: 2px solid #ffaa00;
      }
      .modal-content h3 {
          color: #ffaa00;
          margin-bottom: 15px;
          text-align: center;
      }
      .result-item, .playlist-modal-item {
          background: rgba(0,0,0,0.5);
          border-radius: 15px;
          padding: 10px;
          margin-bottom: 10px;
          display: flex;
          gap: 10px;
          align-items: center;
      }
      .result-item img, .playlist-modal-item img {
          width: 50px;
          border-radius: 8px;
      }
      .result-item .info, .playlist-modal-item .info {
          flex: 1;
          font-size: 12px;
      }
      .result-item button, .playlist-modal-item button {
          background: #ffaa00;
          border: none;
          border-radius: 20px;
          padding: 5px 12px;
          cursor: pointer;
          font-weight: bold;
      }
      .close-modal {
          background: none;
          border: none;
          color: white;
          font-size: 24px;
          position: absolute;
          top: 15px;
          right: 25px;
          cursor: pointer;
      }
      /* Controles flotantes */
      .options-dropdown {
          position: fixed;
          top: 20px;
          left: 20px;
          z-index: 1100;
      }
      .dropdown-btn {
          background: rgba(0,0,0,0.7);
          backdrop-filter: blur(8px);
          border: 1px solid #ffaa00;
          color: #ffaa00;
          padding: 6px 12px;
          border-radius: 30px;
          cursor: pointer;
          font-size: 11px;
      }
      .dropdown-content {
          display: none;
          position: absolute;
          top: 40px;
          left: 0;
          background: rgba(0,0,0,0.85);
          backdrop-filter: blur(10px);
          border: 1px solid #ffaa00;
          border-radius: 15px;
          padding: 10px;
          min-width: 160px;
          flex-direction: column;
          gap: 8px;
          z-index: 1101;
      }
      .dropdown-content.show { display: flex; }
      .dropdown-item {
          display: flex;
          align-items: center;
          gap: 8px;
          font-size: 11px;
      }
      .intensity-slider {
          position: fixed;
          bottom: 10px;
          left: 10px;
          width: 100px;
          background: rgba(0,0,0,0.5);
          border-radius: 20px;
          padding: 4px 8px;
          opacity: 0.5;
          z-index: 1100;
      }
      .current-track-badge {
          position: fixed;
          top: 20px;
          right: 20px;
          background: rgba(0,0,0,0.6);
          backdrop-filter: blur(5px);
          padding: 4px 10px;
          border-radius: 20px;
          font-size: 10px;
          color: #ffaa00;
          z-index: 1000;
      }
      .status-bar {
          position: fixed;
          bottom: 10px;
          right: 10px;
          background: rgba(0,0,0,0.6);
          padding: 3px 8px;
          border-radius: 8px;
          font-size: 9px;
          color: #0f0;
          z-index: 1000;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #1e1e30; border-radius: 5px; }
      ::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 5px; }
      
      /* Modo personal */
      .mode-personal {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 15;
          background: black;
          display: flex;
          justify-content: center;
          align-items: center;
      }
      .personal-bg-image {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: contain;
          background: black;
          z-index: 16;
      }
      .personal-controls {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: rgba(0,0,0,0.7);
          backdrop-filter: blur(10px);
          padding: 10px;
          z-index: 20;
          display: flex;
          gap: 10px;
          justify-content: center;
          align-items: center;
          flex-wrap: wrap;
      }
      .personal-controls button {
          background: rgba(255,255,255,0.2);
          border: none;
          color: white;
          font-size: 16px;
          width: 35px;
          height: 35px;
          border-radius: 50%;
          cursor: pointer;
      }
      .upload-btn {
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: rgba(0,0,0,0.5);
          border: none;
          color: white;
          font-size: 18px;
          width: 36px;
          height: 36px;
          border-radius: 50%;
          cursor: pointer;
          z-index: 21;
      }
      .hidden-input { display: none; }
    </style>
</head>
<body>

<div class="sync-player" id="syncPlayer"></div>
<div class="background-overlay"></div>

<div class="options-dropdown">
    <button class="dropdown-btn" id="dropdownBtn">⚙️ OPCIONES</button>
    <div class="dropdown-content" id="dropdownContent">
        <label class="dropdown-item"><input type="checkbox" id="transparentMode"> 🎨 Modo Transparente</label>
        <label class="dropdown-item"><input type="checkbox" id="fiestaMode"> 🎉 Modo Fiesta 24 años</label>
        <label class="dropdown-item"><input type="checkbox" id="personalMode"> 🖼️ Modo Personal</label>
    </div>
</div>

<div class="intensity-slider" title="Intensidad efectos">
    <input type="range" id="intensitySlider" min="0" max="100" value="30">
    <label style="font-size:8px;">✨</label>
</div>

<div id="fiestaLayer" class="fiesta-layer"></div>
<div class="strobe" id="strobe"></div>
<div class="current-track-badge" id="trackBadge">🎵 Esperando canción...</div>

<!-- MODO DJ -->
<div id="modeDJ" class="mode-dj">
  <div class="dj-app" id="djApp">
    <div class="top-row">
      <!-- Deck izquierdo -->
      <div class="deck-col">
        <div class="deck-title">🎧 DJMENDEZ PRO 🎧</div>
        <div class="vinyl-container">
          <div class="vinyl-lights"></div>
          <div class="vinyl-ripple"></div>
          <div class="vinyl" id="mainVinyl" onclick="togglePlay()">
            <canvas id="vinylCanvas" width="160" height="160"></canvas>
          </div>
        </div>
        <!-- Espectro (sin vu-meter) -->
        <div class="spectrum" id="spectrum"></div>
        <div class="track-info">
          <div class="track-title" id="trackTitle">NO TRACK LOADED</div>
          <div class="track-artist" id="trackArtist">— —</div>
        </div>
        <div class="progress-bar" id="progressBar" onclick="seekTrack(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
        <div class="deck-controls">
          <button class="btn" onclick="prevTrack()">|◀ PREV</button>
          <button class="btn play" id="playPauseBtn" onclick="togglePlay()">▶ PLAY</button>
          <button class="btn" onclick="nextTrack()">▶ NEXT</button>
        </div>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      </div>
      <!-- Columna derecha: video con reproductor sincronizado -->
      <div class="video-col" id="videoCol">
        <div id="previewPlayer" style="width:100%; height:100%; border-radius:20px;"></div>
      </div>
    </div>
    <!-- Fila inferior -->
    <div class="bottom-row">
      <div class="playlist-panel">
        <div class="panel-title">🎵 PLAYLIST</div>
        <div class="playlist-input-row">
          <input type="text" class="search-input" id="playlistUrl" placeholder="URL de playlist YouTube" style="flex:1;">
          <button class="search-btn" id="loadPlaylistBtn">CARGAR</button>
          <button class="search-btn" id="viewPlaylistBtn">📋 VER PLAYLIST</button>
          <div class="shuffle-control">
            <input type="checkbox" id="shuffleCheckbox"> <label style="font-size:11px;">🔀</label>
          </div>
        </div>
        <div style="font-size:11px; color:#aaa; text-align:center; margin-top:5px;">
          La playlist se mostrará en una ventana flotante.
        </div>
      </div>
      <div class="search-panel">
        <div class="panel-title">🔍 BUSCAR CANCIÓN</div>
        <div class="search-row">
          <input type="text" id="searchInput" class="search-input" placeholder="Canción, artista..." onkeypress="if(event.key==='Enter') searchSongs()">
          <button class="search-btn" onclick="searchSongs()">BUSCAR</button>
        </div>
        <div style="font-size:11px; color:#aaa; text-align:center; margin-top:5px;">
          Los resultados aparecerán en una ventana flotante.
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar" id="statusBar">🎧 Inicializando...</div>
</div>

<!-- MODALES -->
<div id="searchModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h3>🎵 Resultados de búsqueda</h3>
        <div id="searchResultsList" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
</div>
<div id="playlistModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" id="closePlaylistModal">&times;</span>
        <h3>📋 PLAYLIST CARGADA</h3>
        <div id="playlistModalList" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
</div>

<!-- MODO PERSONAL -->
<div id="modePersonal" class="mode-personal hide">
    <img id="personalBgImage" class="personal-bg-image" style="display: none;">
    <button class="upload-btn" id="uploadBtnLocal">📁</button>
    <input type="file" id="localAudioFile" class="hidden-input" accept="audio/*">
    <input type="file" id="localImageFile" class="hidden-input" accept="image/*">
    <div class="personal-controls" id="personalControls" style="display: none;">
        <button id="playLocalBtn">▶</button>
        <button id="pauseLocalBtn">⏸</button>
        <div style="flex:1; height:4px; background:rgba(255,255,255,0.3); border-radius:2px; cursor:pointer;" id="localProgressBar">
            <div style="width:0%; height:100%; background:#ffaa00;" id="localProgressFill"></div>
        </div>
        <span id="localCurrentTime">0:00</span>
        <span id="localDuration">0:00</span>
        <input type="range" id="localVolume" min="0" max="100" value="70" style="width:80px;">
        <canvas id="localWave" width="200" height="30" style="width:200px; height:30px; background:#0003; border-radius:8px;"></canvas>
    </div>
</div>

<div class="youtube-players" style="display:none;"><div id="ytPlayer"></div></div>

<script>
// ========== 1. VARIABLES GLOBALES ==========
let currentPlayer = null;      // reproductor principal (deck)
let previewPlayer = null;      // reproductor lateral (video derecho)
let syncPlayer = null;          // reproductor de fondo (blur)
let apiReady = false;
let isLoading = false;

let activePlaylist = [];
let originalPlaylist = [];
let currentIndex = 0;
let shuffleActive = false;

let fiestaActive = false;
let intensity = 30;
let flashInterval = null, confetiInterval, numerosInterval, imagenesInterval, nombreInterval;

// Efecto de destellos alrededor del vinilo
let sparkleInterval = null;

const state = {
    playing: false,
    progress: 0,
    duration: 0,
    volume: 80,
    title: 'NO TRACK LOADED',

let energyLevel = 0.2;
let spectrumBars = [];

// ========== 2. FUNCIONES AUXILIARES ==========
function updateStatus(msg) { let sb=document.getElementById('statusBar'); if(sb) sb.textContent=msg; console.log(msg); }
function fmtTime(s){ let m=Math.floor(s/60); let seg=Math.floor(s%60); return m+':'+(seg<10?'0':'')+seg; }
function escapeHtml(str){ let d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
function extractVideoId(url){ let m=url.match(/(?:youtube\.com\/watch\?v=)([^&]+)/)||url.match(/(?:youtu\.be\/)([^?]+)/); return m?m[1]:url; }
function extractPlaylistId(url){ let m=url.match(/[&?]list=([^&]+)/); return m?m[1]:null; }
function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

// ========== 3. EFECTOS VISUALES DINÁMICOS ==========
function updateEnergyAndSpectrum() {
    if(!state.playing || !currentPlayer) {
        energyLevel = 0.1;
    } else {
        let t = Date.now() / 1000;
        let progressFactor = (currentPlayer.getCurrentTime() || 0) * 0.5;
        let raw = (Math.sin(t * 6) + Math.sin(progressFactor * 10)) / 2 + 0.5;
        energyLevel = 0.25 + raw * 0.7;
        energyLevel = Math.min(0.95, Math.max(0.2, energyLevel));
    }
    // Borde y sombra del deck izquierdo
    let hue = 180 - (energyLevel * 180);
    let borderColor = `hsl(${hue}, 100%, 60%)`;
    let deckCol = document.querySelector('.deck-col');
    if(deckCol) {
        deckCol.style.borderColor = borderColor;
        deckCol.style.boxShadow = `0 0 20px ${borderColor}`;
    }
    // Mismo efecto para el video lateral
    let videoCol = document.getElementById('videoCol');
    if(videoCol) {
        videoCol.style.borderColor = borderColor;
        videoCol.style.boxShadow = `0 0 15px ${borderColor}`;
    }
    // Espectro visual
    let spectrumDiv = document.getElementById('spectrum');
    if(spectrumDiv && spectrumBars.length === 0) {
        for(let i=0; i<20; i++) {
            let bar = document.createElement('div');
            bar.className = 'spectrum-bar';
            bar.style.height = '4px';
            spectrumDiv.appendChild(bar);
            spectrumBars.push(bar);
        }
    }
    for(let i=0; i<spectrumBars.length; i++) {
        let bar = spectrumBars[i];
        let factor = Math.sin(Date.now() * 0.012 + i * 0.25) * 0.6 + 0.4;
        let height = 4 + (energyLevel * factor * 38);
        bar.style.height = height + 'px';
        let barHue = (hue + i * 5) % 360;
        bar.style.background = `hsl(${barHue}, 100%, 60%)`;
    }
    requestAnimationFrame(updateEnergyAndSpectrum);
}
updateEnergyAndSpectrum();

// ========== 4. DESTELLOS ALREDEDOR DEL VINILO ==========
function createSparkle() {
    if(!state.playing) return;
    const container = document.querySelector('.vinyl-container');
    if(!container) return;
    const rect = container.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;
    // Posición aleatoria alrededor del vinilo (radio entre 90 y 110px)
    const angle = Math.random() * Math.PI * 2;
    const radius = 90 + Math.random() * 25;
    const x = centerX + Math.cos(angle) * radius;
    const y = centerY + Math.sin(angle) * radius;
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = (x - 3) + 'px';
    sparkle.style.top = (y - 3) + 'px';
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
}
function startSparkles() {
    if(sparkleInterval) clearInterval(sparkleInterval);
    sparkleInterval = setInterval(() => {
        createSparkle();
    }, 200);
}
function stopSparkles() {
    if(sparkleInterval) clearInterval(sparkleInterval);
    sparkleInterval = null;
}

// ========== 5. VINILO ANIMADO ==========
let vinylAngle=0;
function drawVinyl(){
    let canvas=document.getElementById('vinylCanvas');
    if(!canvas) return;
    let ctx=canvas.getContext('2d');
    let cx=80, cy=80, r=75;
    ctx.clearRect(0,0,160,160);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(vinylAngle);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();
    for(let i=12;i<r-4;i+=10){
        ctx.beginPath(); ctx.arc(0,0,i,0,Math.PI*2);
        ctx.strokeStyle=i%20===0?'#00d4ff30':'#2a2a4050';
        ctx.lineWidth=1.5; ctx.stroke();
    }
    let grad=ctx.createLinearGradient(-r,-r,r,r);
    grad.addColorStop(0,'#00d4ff80'); grad.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2);
    ctx.fillStyle='#0a0a0f'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2);
    ctx.fillStyle= '#00d4ff'; ctx.fill();
    ctx.restore();
    if(state.playing){
        vinylAngle+=0.04;
        ctx.save(); ctx.translate(cx,cy);
        let glow=ctx.createRadialGradient(0,0,40,0,0,75);
        glow.addColorStop(0,'transparent'); glow.addColorStop(1,'#00d4ff40');
        ctx.beginPath(); ctx.arc(0,0,75,0,Math.PI*2);
        ctx.fillStyle=glow; ctx.fill();
        ctx.restore();
    }
    requestAnimationFrame(drawVinyl);
}
drawVinyl();

function getStrobeParams(v) { let freq = Math.max(80, 500 - v*4); let opac = (v/100)*0.3; return {interval:freq, opacity:opac}; }
function updateStrobe() { if(!fiestaActive){ if(flashInterval)clearInterval(flashInterval); return;} if(flashInterval)clearInterval(flashInterval); let {interval,opacity}=getStrobeParams(intensity); if(interval===Infinity)return; let sDiv=document.getElementById('strobe'); let st=false; flashInterval=setInterval(()=>{ if(!fiestaActive)return; sDiv.style.opacity=st?0:opacity; st=!st; },interval); }
function getDelay(v,base){ let factor=Math.max(0.3,Math.min(2.5,2.5-(v/50))); return base*factor; }
function startFiestaEffects(){
    if(!fiestaActive) return;

        makeConf();
        if(numerosInterval)clearTimeout(numerosInterval);

        let makeNum=()=>{ if(!fiestaActive)return; let n=document.createElement('div'); n.className='numero-24'; n.textContent='24'; n.style.left=Math.random()*80+10+'%'; n.style.top=Math.random()*80+10+'%'; n.style.fontSize=(20+Math.random()*30)+'px'; layer.appendChild(n); setTimeout(()=>n.remove(),3000); numerosInterval=setTimeout(makeNum,numDelay); };
        makeNum();
        if(nombreInterval)clearTimeout(nombreInterval);
        let nomDelay=getDelay(intensity,3500);
        let makeNom=()=>{ if(!fiestaActive)return; let nom=document.createElement('div'); nom.className='nombre-cayendo'; nom.textContent='Jean Carlos Mendez'; nom.style.left=Math.random()*70+15+'%'; nom.style.fontSize=(18+Math.random()*20)+'px'; nom.style.color=`hsl(${Math.random()*360},100%,60%)`; layer.appendChild(nom); setTimeout(()=>nom.remove(),4500); nombreInterval=setTimeout(makeNom,nomDelay); };
        makeNom();
        if(imagenesInterval)clearTimeout(imagenesInterval);
        let imgDelay=getDelay(intensity,4000);
        let makeImg=()=>{ if(!fiestaActive)return; let r=Math.floor(Math.random()*10)+1; let img=new Image(); img.onload=()=>{ let d=document.createElement('img'); d.src=img.src; d.className='imagen-random'; d.style.left=Math.random()*80+'%'; d.style.top=Math.random()*80+'%'; d.style.width='150px'; layer.appendChild(d); setTimeout(()=>d.remove(),4000); }; img.onerror=()=>{ let e=document.createElement('div'); e.className='numero-24'; e.style.fontSize='50px'; e.textContent=['🎂','🎈','🎉','🥳','🎁'][Math.floor(Math.random()*5)]; e.style.left=Math.random()*80+'%'; e.style.top=Math.random()*80+'%'; layer.appendChild(e); setTimeout(()=>e.remove(),3000); }; img.src=`${r}.png`; imagenesInterval=setTimeout(makeImg,imgDelay); };
        makeImg();
    }
    schedule();
}
function stopFiestaIntervals(){ if(confetiInterval)clearTimeout(confetiInterval); if(numerosInterval)clearTimeout(numerosInterval); if(imagenesInterval)clearTimeout(imagenesInterval); if(nombreInterval)clearTimeout(nombreInterval); if(flashInterval)clearInterval(flashInterval); }

function syncAllPlayers() {
    if(!currentPlayer || !previewPlayer || !syncPlayer || !apiReady) return;
    let vid = state.videoId;
    if(!vid) return;
    let mainTime = currentPlayer.getCurrentTime();
    let mainState = currentPlayer.getPlayerState();
    
    // Sincronizar preview (lateral) - forzar tiempo exacto
    if(previewPlayer) {
        try {
            let previewVid = previewPlayer.getVideoData()?.video_id;
            if(previewVid !== vid) {
                previewPlayer.loadVideoById({ videoId: vid, startSeconds: mainTime });
                setTimeout(()=> previewPlayer.playVideo(), 50);
            } else {
                if(Math.abs(mainTime - previewPlayer.getCurrentTime()) > 0.15)
                    previewPlayer.seekTo(mainTime, true);
                if(mainState === 1 && previewPlayer.getPlayerState() !== 1) previewPlayer.playVideo();
                else if(mainState !== 1 && previewPlayer.getPlayerState() === 1) previewPlayer.pauseVideo();
            }
        } catch(e) {}
    }
    // Sincronizar fondo
    if(syncPlayer) {
        try {
            let syncVid = syncPlayer.getVideoData()?.video_id;
            if(syncVid !== vid) {
                syncPlayer.loadVideoById({ videoId: vid, startSeconds: mainTime });
                setTimeout(()=> syncPlayer.playVideo(), 50);
            } else {
                if(Math.abs(mainTime - syncPlayer.getCurrentTime()) > 0.15)
                    syncPlayer.seekTo(mainTime, true);
                if(mainState === 1 && syncPlayer.getPlayerState() !== 1) syncPlayer.playVideo();
                else if(mainState !== 1 && syncPlayer.getPlayerState() === 1) syncPlayer.pauseVideo();
            }
            syncPlayer.setVolume(0);
        } catch(e) {}
    }
}
setInterval(syncAllPlayers, 100); // Sincronización muy frecuente

function loadSong(videoId, title, artist, autoPlay=true) {
    if(isLoading) { updateStatus('Cargando, espera...'); return; }
    isLoading=true;
    updateStatus(`Cargando ${title.substring(0,30)}...`);
    state.title=title;
    state.artist=artist;
    state.videoId=videoId;
    state.playing=false;
    document.getElementById('trackTitle').innerText=title;
    document.getElementById('trackArtist').innerText=artist;
    document.getElementById('trackBadge').innerHTML=`🎵 ${title.substring(0,35)} 🎵`;
    
    // Detener destellos mientras carga
    stopSparkles();
    
    // Destruir players existentes
    if(currentPlayer) { try{ currentPlayer.destroy(); }catch(e){} currentPlayer=null; }
    if(previewPlayer) { try{ previewPlayer.destroy(); }catch(e){} previewPlayer=null; }
    
    // Crear nuevo reproductor principal
    let playerDiv=document.getElementById('ytPlayer');
    playerDiv.innerHTML='';
    currentPlayer = new YT.Player('ytPlayer', {
        videoId: videoId,
        playerVars: { autoplay: autoPlay?1:0, controls:0, disablekb:1, modestbranding:1, playsinline:1 },
        events: {
            onReady: e => {
                state.duration = e.target.getDuration();
                e.target.setVolume(state.volume);
                updateUI();
                isLoading=false;
                updateStatus(`✅ Listo: ${title.substring(0,30)}`);
                if(autoPlay) {
                    e.target.playVideo();
                    initPreviewPlayer();  // recrear preview
                    setTimeout(()=> {
                        syncAllPlayers();
                        startSparkles();   // activar destellos solo si está sonando
                    }, 300);
                } else {
                    state.playing=false;
                    document.getElementById('playPauseBtn').innerHTML='▶ PLAY';
                    document.getElementById('mainDeck').classList.remove('playing');
                }
            },
            onStateChange: e => {
                if(e.data===YT.PlayerState.PLAYING){
                    state.playing=true;
                    document.getElementById('playPauseBtn').innerHTML='⏸ PAUSE';
                    document.getElementById('mainDeck').classList.add('playing');
                    syncAllPlayers();
                    startSparkles();
                } else if(e.data===YT.PlayerState.PAUSED){
                    state.playing=false;
                    document.getElementById('playPauseBtn').innerHTML='▶ PLAY';
                    document.getElementById('mainDeck').classList.remove('playing');
                    stopSparkles();
                } else if(e.data===YT.PlayerState.ENDED){
                    state.playing=false;
                    document.getElementById('playPauseBtn').innerHTML='▶ PLAY';
                    document.getElementById('mainDeck').classList.remove('playing');
                    stopSparkles();
                    nextTrack();
                }
            },
            onError: e => { updateStatus(`Error en reproductor`); isLoading=false; stopSparkles(); }
        }
    });
}

function togglePlay() {
    if(!currentPlayer) return;
    try{
        if(currentPlayer.getPlayerState()===1) currentPlayer.pauseVideo();

    }catch(e){}
}
function seekTrack(e){
    let bar=e.currentTarget;
    let rect=bar.getBoundingClientRect();
    let pct=(e.clientX-rect.left)/rect.width;
    if(currentPlayer && state.duration) {
        currentPlayer.seekTo(pct*state.duration, true);
        syncAllPlayers();
    }
}
function setVolume(v){
    state.volume=v;
    if(currentPlayer) currentPlayer.setVolume(v);
}
function updateUI(){

        document.getElementById('currentTime').innerText=fmtTime(cur);

function nextTrack() {
    if(!activePlaylist.length) return;
    let newIdx=currentIndex+1;
    if(newIdx>=activePlaylist.length) newIdx=0;
    currentIndex=newIdx;
    let track=activePlaylist[currentIndex];
    loadSong(track.videoId, track.title, track.artist, true);
}
function prevTrack() {
    if(!activePlaylist.length) return;
    let newIdx=currentIndex-1;
    if(newIdx<0) newIdx=activePlaylist.length-1;
    currentIndex=newIdx;
    let track=activePlaylist[currentIndex];
    loadSong(track.videoId, track.title, track.artist, true);
}

async function loadPlaylist(showModal=true) {
    let url=document.getElementById('playlistUrl').value.trim();
    if(!url) { updateStatus('Ingresa URL de playlist'); return; }
    let pid=extractPlaylistId(url);
    if(!pid) { updateStatus('ID no válido'); return; }
    updateStatus('Cargando playlist...');
    const API_KEY='AIzaSyAWWux-UREbdLfj2IqFY2ac22sHA7OdNPA';
    let all=[], token='';
    try{
        do{
            let resp=await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${pid}&key=${API_KEY}${token?`&pageToken=${token}`:''}`);
            let data=await resp.json();
            if(data.error) throw Error(data.error.message);
            if(data.items) all=all.concat(data.items);
            token=data.nextPageToken||'';
        }while(token);
        if(!all.length) throw Error('No videos');
        let playlist=all.map(i=>({videoId:i.snippet.resourceId.videoId, title:i.snippet.title||'Sin título', artist:i.snippet.videoOwnerChannelTitle||'YouTube'}));
        originalPlaylist=[...playlist];
        if(shuffleActive){
            activePlaylist=shuffleArray([...playlist]);
        } else {
            activePlaylist=[...playlist];
        }
        currentIndex=0;
        updateStatus(`Playlist cargada: ${playlist.length}`);
        if(showModal) displayPlaylistModal(activePlaylist);
        else loadSong(activePlaylist[0].videoId, activePlaylist[0].title, activePlaylist[0].artist, true);
    }catch(e){ updateStatus('Error: '+e.message); }
}
function viewPlaylist() {
    if(activePlaylist.length) displayPlaylistModal(activePlaylist);
    else updateStatus('No hay playlist cargada. Carga una primero.');
}
function applyShuffle(){
    if(shuffleActive && originalPlaylist.length){
        activePlaylist=shuffleArray([...originalPlaylist]);
    } else if(!shuffleActive && originalPlaylist.length){
        activePlaylist=[...originalPlaylist];
    }
    currentIndex=0;
    updateStatus(shuffleActive?'Modo aleatorio activado':'Orden normal');
    displayPlaylistModal(activePlaylist);
}

        if(localAudio) localAudio.pause();
        let url=URL.createObjectURL(file);
        localAudio=new Audio(url);
        localAudio.volume=localVol.value/100;
        localAudio.addEventListener('loadedmetadata',()=>{ localDur.textContent=fmtTime(localAudio.duration); document.getElementById('personalControls').style.display='flex'; });
        localAudio.addEventListener('timeupdate',()=>{ let p=(localAudio.currentTime/localAudio.duration)*100; localFill.style.width=p+'%'; localCurr.textContent=fmtTime(localAudio.currentTime); });
        localAudio.addEventListener('ended',()=>{ playLocal.textContent='▶'; if(localAnim)cancelAnimationFrame(localAnim); });
        if(localCtx) localCtx.close();
        localCtx=new (window.AudioContext||window.webkitAudioContext)();
        localSource=localCtx.createMediaElementSource(localAudio);
        localAnalyser=localCtx.createAnalyser();
        localAnalyser.fftSize=256;
        localSource.connect(localAnalyser);
        localAnalyser.connect(localCtx.destination);
        function drawWave(){
            if(!localAnalyser) return;
            let buffer=localAnalyser.frequencyBinCount;
            let data=new Uint8Array(buffer);
            let ctx=localWave.getContext('2d');
            let w=localWave.clientWidth, h=localWave.clientHeight;
            localWave.width=w; localWave.height=h;
            function anim(){
                if(!localAudio || localAudio.paused){ ctx.clearRect(0,0,w,h); localAnim=requestAnimationFrame(anim); return; }
                localAnalyser.getByteFrequencyData(data);
                ctx.clearRect(0,0,w,h);
                let barW=(w/buffer)*2;
                for(let i=0;i<buffer;i++){
                    let barH=(data[i]/255)*h;
                    ctx.fillStyle=`hsl(${i*2},100%,60%)`;
                    ctx.fillRect(i*barW, h-barH, barW-1, barH);
                }
                localAnim=requestAnimationFrame(anim);
            }
            anim();
        }
        drawWave();
    }
});
playLocal.addEventListener('click',()=>{ if(localAudio){ if(localCtx && localCtx.state==='suspended') localCtx.resume(); localAudio.play(); playLocal.textContent='⏸'; } });
pauseLocal.addEventListener('click',()=>{ if(localAudio){ localAudio.pause(); playLocal.textContent='▶'; } });
localVol.addEventListener('input',(e)=>{ if(localAudio) localAudio.volume=e.target.value/100; });
localProgress.addEventListener('click',(e)=>{ if(localAudio){ let rect=localProgress.getBoundingClientRect(); let p=(e.clientX-rect.left)/rect.width; localAudio.currentTime=p*localAudio.duration; } });
imageFile.addEventListener('change',(e)=>{ let file=e.target.files[0]; if(file){ personalBg.src=URL.createObjectURL(file); personalBg.style.display='block'; } });
uploadBtnLocal.addEventListener('click',()=>{ let c=confirm('Aceptar para audio, Cancelar para imagen'); if(c) audioFile.click(); else imageFile.click(); });

loadYouTubeAPI();
</script>
